<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kontroll-Kiosk Wunschbriefe</title>
<style>
:root{--slate:#3E5668;--rust:#D97A4A;--sage:#7DBB6F;--paper:#F5F4F1;--ink:#1f2b33;--muted:#65737c;--shadow:0 14px 35px rgba(30,45,55,.16)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:var(--paper);color:var(--ink)}body{display:flex;align-items:center;justify-content:center;padding:22px}.app{width:min(980px,100%);min-height:640px;background:white;border-radius:28px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}header{background:var(--slate);color:white;padding:18px 26px;display:flex;align-items:center;justify-content:space-between;gap:12px}header h1{font-size:clamp(1.35rem,3vw,2rem);margin:0}.subtitle{opacity:.86;font-size:.94rem}.header-actions{display:flex;gap:10px}.header-btn{border:2px solid rgba(255,255,255,.55);background:transparent;color:white;border-radius:12px;padding:9px 13px;font-weight:800;cursor:pointer}main{flex:1;padding:34px;display:flex;align-items:center;justify-content:center}.screen{width:100%;max-width:790px;text-align:center}.hidden{display:none!important}.lead{font-size:clamp(1.15rem,2vw,1.45rem);margin:0 0 26px}.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}.big-btn{border:0;border-radius:24px;padding:40px 20px;font-size:clamp(1.6rem,4vw,2.5rem);font-weight:850;cursor:pointer;box-shadow:var(--shadow);transition:.15s}.big-btn:hover,.big-btn:focus-visible{transform:translateY(-2px);outline:4px solid rgba(62,86,104,.25)}.tip{background:var(--sage);color:#15331a}.solution{background:var(--rust);color:#3c1b09}.mode-chip{display:inline-block;padding:8px 15px;border-radius:999px;font-weight:850;margin-bottom:8px}.mode-tip{background:#dcefd7;color:#25552a}.mode-solution{background:#f5dfd0;color:#7a3b18}.number-display{font-size:clamp(2.8rem,7vw,5.2rem);font-weight:850;background:#edf1f3;border-radius:18px;padding:18px;margin:12px auto 22px;min-height:108px;display:flex;align-items:center;justify-content:center}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;max-width:440px;margin:auto}.key{border:0;border-radius:15px;padding:17px;font-size:1.55rem;font-weight:850;background:#e5ebee;cursor:pointer}.key:hover,.key:focus-visible{outline:4px solid rgba(62,86,104,.2)}.key.action{font-size:1rem;background:#d7e0e5}.key.show{grid-column:span 3;background:var(--slate);color:white}.error{min-height:26px;margin-top:13px;color:#a33737;font-weight:800}.result-card{text-align:left;background:#f7f8f8;border:1px solid #dbe1e4;border-radius:22px;padding:27px;box-shadow:0 8px 18px rgba(0,0,0,.06)}.result-card h2{color:var(--slate);margin:0 0 5px}.result-type{font-size:.86rem;font-weight:850;color:var(--rust);text-transform:uppercase;letter-spacing:.055em;margin:8px 0 16px}.result-text{font-size:1.18rem;line-height:1.62;white-space:pre-line}.actions{display:flex;justify-content:center;gap:13px;flex-wrap:wrap;margin-top:22px}.primary,.secondary{border-radius:14px;padding:13px 21px;font-weight:850;cursor:pointer}.primary{border:0;background:var(--slate);color:white}.secondary{border:2px solid var(--slate);background:white;color:var(--slate)}footer{text-align:center;padding:11px 20px;color:var(--muted);font-size:.84rem}@media(max-width:700px){body{padding:0}.app{min-height:100vh;border-radius:0}.choice-grid{grid-template-columns:1fr}main{padding:24px 17px}}
</style></head>
<body><div class="app"><header><div><h1>Kontroll-Kiosk</h1><div class="subtitle">Tipp oder Vergleich zu Blatt 1–24</div></div><div class="header-actions"><button class="header-btn" id="fullscreen">Vollbild</button><button class="header-btn" id="homeHeader">Start</button></div></header>
<main>
<section class="screen" id="startScreen"><p class="lead">Was möchtest du sehen?</p><div class="choice-grid"><button class="big-btn tip" data-mode="tip">Tipp</button><button class="big-btn solution" data-mode="solution">Lösung</button></div></section>
<section class="screen hidden" id="numberScreen"><div id="modeChip" class="mode-chip"></div><p class="lead">Gib die Nummer des Arbeitsblattes ein.</p><div class="number-display" id="display">–</div><div class="keypad"><button class="key">1</button><button class="key">2</button><button class="key">3</button><button class="key">4</button><button class="key">5</button><button class="key">6</button><button class="key">7</button><button class="key">8</button><button class="key">9</button><button class="key action" data-action="clear">Löschen</button><button class="key">0</button><button class="key action" data-action="backspace">⌫</button><button class="key show" data-action="show">Anzeigen</button></div><div class="error" id="error"></div></section>
<section class="screen hidden" id="resultScreen"><div class="result-card"><div id="resultMode" class="mode-chip"></div><h2 id="resultTitle"></h2><div class="result-type" id="resultType"></div><div class="result-text" id="resultText"></div></div><div class="actions"><button class="secondary" id="another">Andere Blattnummer</button><button class="primary" id="home">Zurück zum Start</button></div></section>
</main><footer>Nach 60 Sekunden ohne Bedienung kehrt der Kiosk automatisch zum Start zurück.</footer></div>
<script>
const DATA={"1": {"title": "Unsere Wünsche für die neue Schule", "tip": "Kreuze nur Wünsche an, die wirklich zum Schulalltag passen. Denke an Pausen, Räume, Ausstattung, Angebote oder Unterricht.", "type": "Lösungsbeispiele", "solution": "Zum Schulalltag passen zum Beispiel: mehr Sitzplätze auf dem Schulhof, neue Spiele für die Pause, eine Theater-AG und ein ruhiger Lesebereich. Nicht passend sind: jeden Tag ausschlafen und nie wieder aufräumen. Dein eigener Wunsch kann anders lauten, wenn er zur Schule passt."}, "2": {"title": "Mein Lernweg", "tip": "Beginne mit dem Input. Danach wird geübt. Überlege dann, was vor der Lernerfolgskontrolle kommt.", "type": "Eindeutige Lösung", "solution": "Die Reihenfolge lautet: 1. Input nutzen → 2. Übungen bearbeiten → 3. Vertiefungen wählen → 4. eine Probearbeit schreiben → 5. freiwillig an einem Projekt arbeiten → 6. die Lernerfolgskontrolle schreiben. Projekte sind freiwillig."}, "3": {"title": "Wünsche für unsere Schule", "tip": "Suche im Balkendiagramm zuerst den längsten Balken. Lies die Zahl am Ende des Balkens ab.", "type": "Eindeutige Lösung", "solution": "Am häufigsten wurde die Spieleausleihe genannt: 18 Kinder. Weitere richtige Sätze sind zum Beispiel: „15 Kinder wünschen sich neue Bälle.“ – „12 Kinder wünschen sich Sitzplätze.“ – „9 Kinder wünschen sich einen Ruheraum.“"}, "4": {"title": "Wer schreibt wem?", "tip": "Suche zuerst nach den Namen. Lies danach den Wunsch und zuletzt die Zahl.", "type": "Eindeutige Lösung", "solution": "Richtig sind: Lena schreibt den Brief. Lena wünscht sich eine Leseecke. Lena schreibt an Frau Neumann, weil sie sich eine Leseecke wünscht. Das Umfrageergebnis zeigt: 17 von 26 Kindern wünschen sich eine Leseecke. Falsch ist: Frau Neumann schreibt den Brief. Ebenfalls falsch: 17 Kinder wünschen sich neue Bälle."}, "5": {"title": "Wer kann dabei helfen?", "tip": "Frage dich: Wer kann den Wunsch besprechen, erlauben, organisieren, reparieren oder bezahlen?", "type": "Eindeutige Zuordnung", "solution": "Klassenausflug besprechen → 1 Klassenleitung. Ruheraum vorschlagen → 2 Schulleitung. Kaputten Haken reparieren lassen → 3 Hausmeisterei. Spieleausleihe planen → 4 Schülervertretung. Geld für neue Pausenbälle erbitten → 5 Förderverein."}, "6": {"title": "Was ist der Wunsch?", "tip": "Der Wunsch sagt, was sich ändern soll. Die Zahl zeigt, wie viele Kinder das möchten.", "type": "Eindeutige Lösung und Lösungsbeispiel", "solution": "Im Beispiel ist der Wunsch: „Wir wünschen uns eine Leseecke.“ Das Umfrageergebnis ist: „17 von 26 Kindern haben sich dafür entschieden.“ Bei Aufgabe 2 kann dein Satz lauten: „Wir wünschen uns Ablagefächer. 20 Kinder wünschen sich Ablagefächer.“ Oder: „Wir wünschen uns Ablagefächer, weil sie Ordnung schaffen.“"}, "7": {"title": "Die Teile eines Briefes", "tip": "Der Brief beginnt mit Ort und Datum. Danach folgt die Anrede.", "type": "Eindeutige Lösung", "solution": "Die richtige Reihenfolge lautet: 1. Ort und Datum – 2. Anrede – 3. Brieftext – 4. Grußformel – 5. Name."}, "8": {"title": "Das Briefpuzzle", "tip": "Beginne mit Ort und Datum. Suche im Brieftext nach „wünsche ich mir“.", "type": "Eindeutige Lösung", "solution": "Reihenfolge: 1. Dortmund, 16. September 2026 – 2. Sehr geehrte Frau Schneider, – 3. Für unseren Schulhof wünsche ich mir eine Tischtennisplatte. Dann könnten wir uns bewegen und gemeinsam spielen. – 4. Freundliche Grüße – 5. Mina. Mina wünscht sich eine Tischtennisplatte für den Schulhof."}, "9": {"title": "Anrede und Grußformel", "tip": "Zu offiziellen Personen passen meist „Sehr geehrte …“ und „Freundliche Grüße“.", "type": "Eindeutige Lösung", "solution": "Klassenlehrerin Frau Neumann → A / E: „Liebe Frau Neumann,“ und „Viele Grüße“. Schulleiterin Frau Schneider → B / F: „Sehr geehrte Frau Schneider,“ und „Freundliche Grüße“. Hausmeister Herr Yilmaz → C / E: „Lieber Herr Yilmaz,“ und „Viele Grüße“. Freundin Mia → D / G: „Hallo Mia,“ und „Liebe Grüße“."}, "10": {"title": "Fehlerwerkstatt Briefaufbau", "tip": "Prüfe die Reihenfolge: Ort und Datum – Anrede – Brieftext – Grußformel – Name.", "type": "Musterlösung", "solution": "Dortmund, 20. September 2026\n\nLiebe Frau Berger,\n\nich wünsche mir neue Sitzkissen für unsere Leseecke.\n\nViele Grüße\nJonas"}, "11": {"title": "Freundlich und genau", "tip": "Prüfe zwei Dinge getrennt: den Ton und die Genauigkeit der Aussage.", "type": "Eindeutige Lösung", "solution": "„Kaufen Sie sofort neue Spiele!“ → nicht freundlich, nicht genau. „Wir würden uns über neue Spiele freuen.“ → freundlich, aber nicht genau. „Fast alle wollen eine Spieleausleihe.“ → nicht freundlich formuliert und nicht genau. „18 von 26 Kindern wünschen sich eine Spieleausleihe.“ → freundlich und genau."}, "12": {"title": "Satzstarter für Wunschbriefe", "tip": "Achte auf Grammatik und Bedeutung. Ein Satzanfang muss mit seinem Ende einen vollständigen Satz bilden.", "type": "Eindeutige Lösung und Beispiele", "solution": "Zuordnung: A–2: „Ich wünsche mir neue Sitzbänke für den Schulhof.“ B–1: „Ich würde mich freuen, wenn Sie eine Spieleausleihe anbieten könnten.“ C–3: „In unserer Umfrage haben sich 18 Kinder eine Spieleausleihe gewünscht.“ D–4: „Das Diagramm zeigt, dass besonders viele Kinder Ablagefächer möchten.“"}, "13": {"title": "Mein Wunsch für den Schulalltag", "tip": "Formuliere zuerst deinen Wunsch. Ergänze Daten nur, wenn sie wirklich zu deinem Wunsch passen.", "type": "Lösungsbeispiele", "solution": "Beispiel: „Für unseren Schulalltag wünsche ich mir eine Spieleausleihe.“ Passender Datensatz: „In der Beispielumfrage haben sich 18 von 26 Kindern eine Spieleausleihe gewünscht.“ Gibt es zu deinem Wunsch kein Ergebnis, lässt du den Datensatz weg. Das ist völlig in Ordnung."}, "14": {"title": "Einen Grund ergänzen", "tip": "Ein sachlicher Grund erklärt den Nutzen. Die Zahl zeigt zusätzlich, wie viele Kinder den Wunsch teilen.", "type": "Lösungsbeispiele", "solution": "Zur Leseecke: „Eine Leseecke wäre gut, weil wir dort ruhig lesen und uns erholen könnten. Außerdem haben sich 17 von 26 Kindern eine Leseecke gewünscht.“ Die Zahl ersetzt den sachlichen Grund nicht, sondern verstärkt ihn."}, "15": {"title": "Auf ein Bedenken eingehen", "tip": "Eine gute Lösung muss das genannte Problem wirklich lösen.", "type": "Eindeutige Lösung und Lösungsbeispiel", "solution": "Passende Lösung: „Die Spiele werden in einer Kiste aufbewahrt und mit Namenskarten ausgeliehen.“ Beispiel für vier Sätze: „Wir wünschen uns eine Spieleausleihe. 18 von 26 Kindern wünschen sie sich. Ein Bedenken ist, dass Spiele verloren gehen könnten. Deshalb könnten sie in einer beschrifteten Kiste aufbewahrt und mit Namenskarten ausgeliehen werden.“"}, "16": {"title": "Mein Schreibplan", "tip": "Notiere Stichwörter, keine ausformulierten Sätze. Bei Daten brauchst du die genaue Zahl und möglichst die Gesamtzahl.", "type": "Erfolgskriterien", "solution": "Dein Plan enthält: 1. Empfänger, 2. Wunsch, 3. einen sachlichen Grund, 4. ein passendes Umfrageergebnis – nur wenn vorhanden –, 5. Anrede und Grußformel. Du solltest mit dem Plan mündlich erklären können, was du schreiben möchtest."}, "17": {"title": "Mein Briefgerüst", "tip": "Wähle nur Satzanfänge, die zu deinem Brief passen. Du musst nicht jede Zeile nutzen.", "type": "Lösungsbeispiel", "solution": "Beispiel: „Sehr geehrte Frau Schneider, ich schreibe Ihnen, weil ich einen Wunsch für unsere Schule habe. Für unsere Schule wünsche ich mir eine Leseecke. Das wäre gut, weil wir dort ruhig lesen könnten. In unserer Umfrage haben sich 17 von 26 Kindern eine Leseecke gewünscht. Ich würde mich darüber sehr freuen. Freundliche Grüße, Mila“"}, "18": {"title": "Mein erster Wunschbrief", "tip": "Wähle einen Wunsch aus dem Diagramm oder einen eigenen. Plane zuerst Empfänger, Wunsch und Grund.", "type": "Musterlösung", "solution": "Beispiel zum häufigsten Wunsch im Diagramm:\n\nDortmund, 22. September 2026\n\nSehr geehrte Frau Schneider,\n\nfür unsere Schule wünsche ich mir eine Sport-AG. Das wäre gut, weil wir uns dort bewegen und gemeinsam Sport treiben könnten. In der Umfrage haben sich 19 von 26 Kindern eine Sport-AG gewünscht.\n\nIch würde mich darüber sehr freuen.\n\nFreundliche Grüße\nAmir\n\nAuch ein anderer vollständiger und passender Wunschbrief kann richtig sein."}, "19": {"title": "Checkliste Wunschbrief", "tip": "Gehe jede Zeile einzeln durch. Verbessere sofort, wenn du „Noch nicht“ ankreuzt.", "type": "Erfolgskriterien", "solution": "Prüfe: passende Anrede; Wunsch deutlich und freundlich; vollständige Sätze; passende Grußformel und Name; Brief gut lesbar. Falls du Daten nutzt: Zahl richtig übernommen und Bedeutung verständlich erklärt. Danach verbesserst du mindestens eine Stelle."}, "20": {"title": "Mein Brief wird besser", "tip": "Das Wort „alle“ stimmt nur, wenn wirklich jedes Kind so abgestimmt hat.", "type": "Musterverbesserung", "solution": "Fehler: 17 von 26 Kindern sind nicht alle Kinder. Auch „Bitte richten Sie eine ein“ klingt recht fordernd. Verbesserung:\n\nSehr geehrte Frau Schneider,\n\nin unserer Umfrage haben sich 17 von 26 Kindern eine Leseecke gewünscht. Wir würden uns sehr freuen, wenn eine Leseecke eingerichtet werden könnte.\n\nViele Grüße\nMila"}, "21": {"title": "Meine Probearbeit", "tip": "Arbeite wie bei der späteren Arbeit: erst mit Blatt 16 planen, dann schreiben, danach mit Blatt 19 kontrollieren.", "type": "Musterlösung und Erfolgskriterien", "solution": "Beispiel:\n\nDortmund, 24. September 2026\n\nSehr geehrte Frau Schneider,\n\nfür unsere Pausen wünsche ich mir eine Spieleausleihe. Sie wäre sinnvoll, weil Kinder dann gemeinsam spielen könnten. In der Umfrage haben sich 18 von 26 Kindern eine Spieleausleihe gewünscht.\n\nIch würde mich darüber sehr freuen.\n\nFreundliche Grüße\nLena\n\nFür den Mindeststandard reicht ein vollständiger, freundlicher Wunschbrief. Die Datennutzung ist eine Vertiefung."}, "22": {"title": "Bin ich bereit?", "tip": "Nutze deine Probearbeit als Beleg. Kreuze nicht nur nach Gefühl an.", "type": "Erfolgskriterien", "solution": "Du solltest sicher können: den Schreibauftrag verstehen, einen Brief richtig aufbauen, deinen Wunsch freundlich formulieren und deinen Brief prüfen. Ein Umfrageergebnis richtig wiederzugeben ist eine Vertiefung und entscheidet nicht allein darüber, ob du bereit bist."}, "23": {"title": "Mein Übungsweg bis zur Arbeit", "tip": "Wähle wenige Aufgaben, die genau zu deiner Unsicherheit passen.", "type": "Eindeutige Orientierung", "solution": "Empfänger und Wunsch erkennen → Blatt 4–6. Briefaufbau → Blatt 7–10. Freundlich formulieren → Blatt 11–13. Daten lesen und als Satz nutzen → Blatt 3, 12, 14 und 20. Brief planen → Blatt 16–17. Schreiben und kontrollieren → Blatt 18–21."}, "24": {"title": "Mein Rückblick auf das Prüfungsfenster", "tip": "Denke an deinen gewählten Termin und deinen Arbeitsweg. Was hat geholfen? Was planst du nächstes Mal anders?", "type": "Keine feste Lösung", "solution": "Hier gibt es keine feste Musterlösung. Mögliche Satzstarter: „Gut gelungen ist mir …“ – „Diese Hilfe oder Strategie hat mir geholfen: …“ – „Beim nächsten Mal plane ich …“ Deine Antwort soll ehrlich zu deinen Erfahrungen passen."}};let mode=null,number="",timer;
const screens={start:document.getElementById("startScreen"),number:document.getElementById("numberScreen"),result:document.getElementById("resultScreen")};const display=document.getElementById("display"),error=document.getElementById("error"),modeChip=document.getElementById("modeChip");
function resetTimer(){clearTimeout(timer);timer=setTimeout(goHome,60000)}["click","keydown","mousemove","touchstart"].forEach(ev=>document.addEventListener(ev,resetTimer,{passive:true}));
function showScreen(n){Object.values(screens).forEach(s=>s.classList.add("hidden"));screens[n].classList.remove("hidden")}
function goHome(){mode=null;number="";display.textContent="–";error.textContent="";showScreen("start")}
function chooseMode(m){mode=m;number="";display.textContent="–";error.textContent="";modeChip.textContent=m==="tip"?"Tipp":"Lösung";modeChip.className="mode-chip "+(m==="tip"?"mode-tip":"mode-solution");showScreen("number")}
function updateDisplay(){display.textContent=number||"–"}function addDigit(d){if(number.length<2){number+=d;updateDisplay()}}
function showResult(){const n=Number(number);if(!Number.isInteger(n)||n<1||n>24||!DATA[n]){error.textContent="Bitte gib eine Blattnummer von 1 bis 24 ein.";return}const item=DATA[n];document.getElementById("resultTitle").textContent=`Blatt ${n} – ${item.title}`;const rm=document.getElementById("resultMode");rm.textContent=mode==="tip"?"Tipp":"Lösung";rm.className="mode-chip "+(mode==="tip"?"mode-tip":"mode-solution");document.getElementById("resultType").textContent=mode==="tip"?"Hinweis zum Weiterarbeiten":item.type;document.getElementById("resultText").textContent=mode==="tip"?item.tip:item.solution;showScreen("result")}
document.querySelectorAll("[data-mode]").forEach(b=>b.addEventListener("click",()=>chooseMode(b.dataset.mode)));document.querySelectorAll(".key").forEach(b=>b.addEventListener("click",()=>{const a=b.dataset.action;if(a==="clear")number="";else if(a==="backspace")number=number.slice(0,-1);else if(a==="show")return showResult();else addDigit(b.textContent.trim());updateDisplay();error.textContent=""}));
document.addEventListener("keydown",e=>{if(!screens.number.classList.contains("hidden")){if(/^[0-9]$/.test(e.key))addDigit(e.key);else if(e.key==="Backspace"){number=number.slice(0,-1);updateDisplay()}else if(e.key==="Delete"||e.key==="Escape"){number="";updateDisplay()}else if(e.key==="Enter")showResult()}});
document.getElementById("home").onclick=goHome;document.getElementById("homeHeader").onclick=goHome;document.getElementById("another").onclick=()=>{number="";updateDisplay();error.textContent="";showScreen("number")};document.getElementById("fullscreen").onclick=async()=>{try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()}catch(e){}};
const params=new URLSearchParams(location.search);if(params.has("mode")&&params.has("blatt")){chooseMode(params.get("mode")==="solution"?"solution":"tip");number=params.get("blatt");updateDisplay();showResult()}else goHome();resetTimer();
</script></body></html>
